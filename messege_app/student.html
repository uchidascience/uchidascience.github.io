<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>生徒用</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>

<style>
body { margin: 0; font-family: sans-serif; }

#infoDisplay {
  position: absolute;
  top: 8px;
  left: 10px;
  font-size: 14px;
  background: rgba(255,255,255,0.85);
  padding: 4px 8px;
  z-index: 10;
}

#statusDisplay {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 14px;
  background: rgba(255,255,255,0.85);
  padding: 4px 8px;
  z-index: 10;
}

#studentArea {
  width: 100vw;
  height: 100vh;
  padding-top: 40px;
  box-sizing: border-box;
}

iframe {
  width: 100%;
  height: 100%;
  border: 1px solid #ccc;
  box-sizing: border-box;
}
</style>
</head>

<body>

<div id="infoDisplay">番号:1 / タイトル:基本のチャットアプリ</div>
<div id="statusDisplay">状態:初期化中</div>

<div id="studentArea">
  <iframe id="frame"></iframe>
</div>

<script>
const titleList = [
  "基本のチャットアプリ",
  "パケット通信",
  "個人認証",
  "パスワードの解読",
  "パケットキャプチャー",
  "暗号化"
];

const urlList = [
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/message_app.sb3&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/Account_non.sb3&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/Account_C.sb3&block=basic&id=AH05B23F3B",
  "mama",
  "mama",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/message_app6.sb3&block=basic&id=AH05B23F3B"
];

const ably = new Ably.Realtime({
  key: "yPyk0g.YmsQlA:1T_iCByOObaZup3LYuvuWhAjCbRMOVvsMGCl1U9sOZk"
});

const channel = ably.channels.get("lesson-control");

let currentNumber = 1;
const frame = document.getElementById("frame");

function updateInfoDisplay() {
  document.getElementById("infoDisplay").textContent =
    "番号:" + currentNumber +
    " / タイトル:" + titleList[currentNumber - 1];
}

function updateStatusDisplay(status) {
  document.getElementById("statusDisplay").textContent = "状態:" + status;
}

function updateDisplays(status) {
  updateInfoDisplay();
  updateStatusDisplay(status);
}

function updateIframe() {
  const url = urlList[currentNumber - 1];

  if (url !== "mama") {
    frame.src = url;
  }
}

ably.connection.on((stateChange) => {
  updateStatusDisplay(stateChange.current);
});

channel.subscribe("next-number", (message) => {
  currentNumber = message.data.number;
  updateDisplays("受信");
  updateIframe();
});

updateIframe();
updateDisplays("初期表示");
</script>

</body>
</html>
