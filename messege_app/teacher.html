<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>先生用</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: sans-serif;
}

button, a { touch-action: manipulation; }

.topBar {
  position: absolute;
  top: 8px;
  height: 32px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.9);
  padding: 0 8px;
  border-radius: 6px;
  z-index: 20;
  font-size: 14px;
}

#infoDisplay { left: 10px; }

#buttons {
  left: 50%;
  transform: translateX(-50%);
}

#statusArea { right: 10px; }

.buttonSpacer {
  width: 16px;
}

#imageLinks {
  display: flex;
  gap: 8px;
  align-items: center;
}

#imageLinks a {
  color: #0645ad;
  cursor: pointer;
  text-decoration: underline;
}

#frameArea {
  display: flex;
  width: 100vw;
  height: 100dvh;
  padding-top: 48px;
  box-sizing: border-box;
}

.pane {
  height: 100%;
  position: relative;
  overflow: hidden;
}

.iframeWrap {
  width: 100%;
  height: 100%;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

iframe {
  width: 100%;
  height: 100%;
  border: 1px solid #ccc;
  box-sizing: border-box;
  display: block;
}

#leftPane { width: 50%; }
#rightPane { width: 50%; }

#divider {
  width: 12px;
  background: #ccc;
  cursor: col-resize;
  height: 100%;
  flex-shrink: 0;
  touch-action: none;
}

.hidden { display: none; }

.dragging iframe {
  pointer-events: none;
}

body.imageMode #frameArea {
  filter: blur(4px);
}

#imageOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}

#imageOverlay img {
  max-width: 96vw;
  max-height: 92vh;
  object-fit: contain;
  background: white;
}

#closeImageButton {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 110;
  font-size: 18px;
  padding: 8px 14px;
}
</style>
</head>

<body>

<div id="infoDisplay" class="topBar">
  <button id="numberButton">ページ:1</button>
  <span>基本のチャットアプリ</span>
</div>

<div id="buttons" class="topBar">
  <button id="prevButton">戻る</button>
  <button id="nextButton">次へ</button>
  <span class="buttonSpacer"></span>
  <div id="imageLinks"></div>
</div>

<div id="statusArea" class="topBar">
  <button id="forceReloadButton">状態:初期化中</button>
</div>

<div id="frameArea">
  <div id="leftPane" class="pane">
    <div class="iframeWrap">
      <iframe id="leftFrame"></iframe>
    </div>
  </div>

  <div id="divider"></div>

  <div id="rightPane" class="pane">
    <div class="iframeWrap">
      <iframe id="rightFrame"></iframe>
    </div>
  </div>
</div>

<div id="imageOverlay">
  <button id="closeImageButton">解除</button>
  <img id="overlayImage" src="">
</div>

<script>
const titleList = [
  "基本のチャットアプリ",
  "パケット通信",
  "個人認証",
  "パスワードの解読",
  "パケットキャプチャ",
  "暗号化"
];

const teacherUrlListLeft = [
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/message_app.sb3&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/Account_non.sb3&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/Account_S.sb3&fullscreen=true&block=basic&id=AH05B23F3B",
  "mama",
  "mama",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/message_app6.sb3&block=basic&id=AH05B23F3B"
];
    
const teacherUrlListRight = [
  null,
  null,
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/Account_C.sb3&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/Account_Decipher.sb3&fullscreen=true&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/beta/?project=https://uchidascience.github.io/messege_app/message_app_packetcapture.sb3&fullscreen=true&block=basic&id=AH05B23F3B",
  "mama"
];

const imageList = [
  { title: "送信プログラム", url: "./img/1.png" },
  { title: "受信プログラム", url: "./img/2.png" },
  { title: "ネットワーク", url: "./img/3.png" },
  { title: "パケット通信", url: "./img/4.png" },
  { title: "IPアドレス", url: "./img/5.png" },
  { title: "パスワード", url: "./img/6.png" },
  { title: "暗号化", url: "./img/7.png" }
];

const ably = new Ably.Realtime({
  key: "yPyk0g.YmsQlA:1T_iCByOObaZup3LYuvuWhAjCbRMOVvsMGCl1U9sOZk"
});

const channel = ably.channels.get("lesson-control");

let currentNumber = 1;
let leftWidthPercent = 50;
let isDragging = false;

let lastLeftUrl = teacherUrlListLeft[0];
let lastRightUrl = teacherUrlListRight[0];

const leftPane = document.getElementById("leftPane");
const rightPane = document.getElementById("rightPane");
const divider = document.getElementById("divider");
const leftFrame = document.getElementById("leftFrame");
const rightFrame = document.getElementById("rightFrame");

function createImageLinks() {
  const area = document.getElementById("imageLinks");
  area.innerHTML = "";

  imageList.forEach((item) => {
    const link = document.createElement("a");
    link.textContent = item.title;
    link.href = "#";
    link.onclick = async (event) => {
      event.preventDefault();
      showImage(item.url);
      await channel.publish("show-image", { url: item.url });
      updateStatusDisplay("画像送信");
    };
    area.appendChild(link);
  });
}

function showImage(url) {
  document.body.classList.add("imageMode");
  document.getElementById("overlayImage").src = url;
  document.getElementById("imageOverlay").style.display = "flex";
}

async function hideImage(sendToStudents = true) {
  document.body.classList.remove("imageMode");
  document.getElementById("imageOverlay").style.display = "none";
  document.getElementById("overlayImage").src = "";

  if (sendToStudents) {
    await channel.publish("hide-image", {});
    updateStatusDisplay("画像解除");
  }
}

function updateInfoDisplay() {
  document.getElementById("infoDisplay").innerHTML =
    `<button id="numberButton">ページ:${currentNumber}</button><span>${titleList[currentNumber - 1]}</span>`;

  document.getElementById("numberButton").onclick = () => {
    if (confirm("ページを強制更新しますか？")) {
      updateIframes(true);
      updateStatusDisplay("強制更新");
    }
  };
}

function updateStatusDisplay(status) {
  document.getElementById("forceReloadButton").textContent = "状態:" + status;
}

function updateDisplays(status) {
  updateInfoDisplay();
  updateStatusDisplay(status);
}

function updateIframes(forceReload = false) {
  const leftUrl = teacherUrlListLeft[currentNumber - 1];
  const rightUrl = teacherUrlListRight[currentNumber - 1];

  if (rightUrl === null) {
    leftPane.style.width = "100%";
    rightPane.classList.add("hidden");
    divider.classList.add("hidden");

    if (leftUrl !== "mama") {
      lastLeftUrl = leftUrl;
      leftFrame.src = leftUrl;
    } else if (forceReload && lastLeftUrl) {
      leftFrame.src = lastLeftUrl;
    }

    rightFrame.src = "about:blank";
  } else {
    leftPane.style.width = leftWidthPercent + "%";
    rightPane.style.width = (100 - leftWidthPercent) + "%";

    rightPane.classList.remove("hidden");
    divider.classList.remove("hidden");

    if (leftUrl !== "mama") {
      lastLeftUrl = leftUrl;
      leftFrame.src = leftUrl;
    } else if (forceReload && lastLeftUrl) {
      leftFrame.src = lastLeftUrl;
    }

    if (rightUrl !== "mama") {
      lastRightUrl = rightUrl;
      rightFrame.src = rightUrl;
    } else if (forceReload && lastRightUrl) {
      rightFrame.src = lastRightUrl;
    }
  }
}

async function sendCurrentNumber() {
  try {
    await channel.publish("next-number", { number: currentNumber });
    updateStatusDisplay("送信済み");
  } catch (error) {
    updateStatusDisplay("送信エラー");
    console.error(error);
  }
}

document.getElementById("prevButton").onclick = () => {
  if (currentNumber > 1) {
    if (confirm("前のページに戻りますか？")) {
      currentNumber--;
      updateDisplays("送信中");
      updateIframes();
      sendCurrentNumber();
    }
  }
};

document.getElementById("nextButton").onclick = () => {
  if (currentNumber < titleList.length) {
    if (confirm("次のページに移動しますか？")) {
      currentNumber++;
      updateDisplays("送信中");
      updateIframes();
      sendCurrentNumber();
    }
  }
};

document.getElementById("forceReloadButton").onclick = () => {
  updateStatusDisplay("再送信中");
  sendCurrentNumber();
};

document.getElementById("closeImageButton").onclick = () => {
  hideImage(true);
};

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    hideImage(true);
  }
});

ably.connection.on((stateChange) => {
  updateStatusDisplay(stateChange.current);
});

channel.subscribe("request-current-number", () => {
  updateStatusDisplay("問い合わせ受信・再送信中");
  sendCurrentNumber();
});

divider.addEventListener("pointerdown", (event) => {
  isDragging = true;
  document.body.classList.add("dragging");
  divider.setPointerCapture(event.pointerId);
  event.preventDefault();
});

divider.addEventListener("pointerup", (event) => {
  isDragging = false;
  document.body.classList.remove("dragging");
  divider.releasePointerCapture(event.pointerId);
});

divider.addEventListener("pointermove", (event) => {
  if (!isDragging) return;

  const rect = document.getElementById("frameArea").getBoundingClientRect();
  let percent = ((event.clientX - rect.left) / rect.width) * 100;
  percent = Math.max(10, Math.min(90, percent));

  leftWidthPercent = percent;
  leftPane.style.width = leftWidthPercent + "%";
  rightPane.style.width = (100 - leftWidthPercent) + "%";

  event.preventDefault();
});

createImageLinks();
updateIframes();
updateDisplays("初期表示");
</script>

</body>
</html>
