<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>先生用</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: sans-serif;
}

button, select, a {
  touch-action: manipulation;
}

#topControls {
  position: absolute;
  top: 8px;
  left: 0;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr auto auto 1fr;
  align-items: center;
  z-index: 20;
  box-sizing: border-box;
  padding: 0 10px;
}

.topGroup {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.9);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 14px;
  width: fit-content;
}

#leftGroup { justify-self: start; }
#centerGroup { justify-self: center; }
#selectGroup { justify-self: center; margin-left: 16px; }
#rightGroup { justify-self: end; }

#imageSelect {
  font-size: 14px;
  height: 28px;
}

#aboutLink {
  margin-left: 10px;
  font-size: 14px;
  color: #0066cc;
  text-decoration: underline;
  white-space: nowrap;
}

#frameArea {
  display: flex;
  width: 100vw;
  height: 100dvh;
  padding-top: 52px;
  box-sizing: border-box;
}

.pane {
  height: 100%;
  position: relative;
  overflow: hidden;
}

.iframeWrap {
  width: 100%;
  height: 100%;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

iframe {
  width: 100%;
  height: 100%;
  border: 1px solid #ccc;
  box-sizing: border-box;
  display: block;
}

#leftPane { width: 50%; }
#rightPane { width: 50%; }

#divider {
  width: 12px;
  background: #ccc;
  cursor: col-resize;
  height: 100%;
  flex-shrink: 0;
  touch-action: none;
}

.hidden { display: none; }

.dragging iframe {
  pointer-events: none;
}

body.imageMode #frameArea {
  filter: blur(4px);
}

#imageOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}

#imageOverlay img {
  max-width: 96vw;
  max-height: 92vh;
  object-fit: contain;
  background: white;
}

#closeImageButton {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 110;
  font-size: 18px;
  padding: 8px 14px;
}
</style>
</head>

<body>

<div id="topControls">
  <div id="leftGroup" class="topGroup">
    <button id="numberButton">ページ:1</button>
    <span id="titleText">基本のチャットアプリ</span>
  </div>

  <div id="centerGroup" class="topGroup">
    <button id="prevButton">戻る</button>
    <button id="nextButton">次へ</button>
  </div>

  <div id="selectGroup" class="topGroup">
    <select id="imageSelect">
      <option value="">▼資料を表示</option>
    </select>
  </div>

  <div id="rightGroup" class="topGroup">
    <button id="forceReloadButton">状態:初期化中</button>
    <a id="aboutLink" href="about.htm" target="_blank" rel="noopener noreferrer">本アプリに関して</a>
  </div>
</div>

<div id="frameArea">
  <div id="leftPane" class="pane">
    <div class="iframeWrap">
      <iframe id="leftFrame"></iframe>
    </div>
  </div>

  <div id="divider"></div>

  <div id="rightPane" class="pane">
    <div class="iframeWrap">
      <iframe id="rightFrame"></iframe>
    </div>
  </div>
</div>

<div id="imageOverlay">
  <button id="closeImageButton">解除</button>
  <img id="overlayImage" src="">
</div>

<script>
const titleList = [
  "基本のチャットアプリ",
  "パケット通信",
  "個人認証",
  "パスワードの解読",
  "パケットキャプチャ",
  "暗号化"
];

const teacherUrlListLeft = [
  "https://toio.github.io/toio-visual-programming/external/?project=https://uchidascience.github.io/messege_app/message_app.sb3&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/external/?project=https://uchidascience.github.io/messege_app/Account_non.sb3&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/external/?project=https://uchidascience.github.io/messege_app/Account_S.sb3&fullscreen=true&block=basic&id=AH05B23F3B",
  "mama",
  "mama",
  "https://toio.github.io/toio-visual-programming/external/?project=https://uchidascience.github.io/messege_app/message_app6.sb3&block=basic&id=AH05B23F3B"
];
    
const teacherUrlListRight = [
  null,
  null,
  "https://toio.github.io/toio-visual-programming/external/?project=https://uchidascience.github.io/messege_app/Account_C.sb3&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/external/?project=https://uchidascience.github.io/messege_app/Account_Decipher.sb3&fullscreen=true&block=basic&id=AH05B23F3B",
  "https://toio.github.io/toio-visual-programming/external/?project=https://uchidascience.github.io/messege_app/message_app_packetcapture.sb3&fullscreen=true&block=basic&id=AH05B23F3B",
  "mama"
];

const imageList = [
  { title: "1-1　送信プログラム", url: "./img/1.png" },
  { title: "1-2　受信プログラム", url: "./img/2.png" },
  { title: "1-3　情報モラル", url: "./img/3.png" },
  { title: "2-1　ネットワークの構成", url: "./img/4.png" },
  { title: "2-2　パケット通信", url: "./img/5.png" },
  { title: "2-3　IPアドレス", url: "./img/6.png" },
  { title: "3-1　サーバとクライアント", url: "./img/7.png" },
  { title: "4-1　安全なパスワード", url: "./img/8.png" },
  { title: "5-1　危険なネットワーク", url: "./img/9.png" },
  { title: "6-1　暗号化・復号化", url: "./img/10.png" },
  { title: "7-1　ファイアウォール", url: "./img/11.png" },
  { title: "7-2　不正プログラム", url: "./img/12.png" },
  { title: "7-3　フィッシング詐欺", url: "./img/13.png" }
];

function getKeyword() {
  const params = new URLSearchParams(window.location.search);
  let keyword = params.get("keyword");

  if (!keyword || keyword.trim() === "") {
    keyword = prompt("チャンネルを指定してください。");

    if (!keyword || keyword.trim() === "") {
      alert("チャンネルが指定されていないため、通信を開始できません。");
      throw new Error("keyword is missing");
    }

    keyword = keyword.trim();

    const newUrl =
      window.location.pathname +
      "?keyword=" + encodeURIComponent(keyword);

    window.history.replaceState(null, "", newUrl);
  }

  return keyword.trim();
}

function getChannelName() {
  return "lesson-control-" + encodeURIComponent(getKeyword());
}

function getChannelLabel() {
  return getKeyword();
}

const ably = new Ably.Realtime({
  key: "yPyk0g.YmsQlA:1T_iCByOObaZup3LYuvuWhAjCbRMOVvsMGCl1U9sOZk"
});

const channelName = getChannelName();
const channel = ably.channels.get(channelName);

let currentNumber = 1;
let leftWidthPercent = 50;
let isDragging = false;

let lastLeftUrl = teacherUrlListLeft[0];
let lastRightUrl = teacherUrlListRight[0];
let currentImageUrl = null;

const leftPane = document.getElementById("leftPane");
const rightPane = document.getElementById("rightPane");
const divider = document.getElementById("divider");
const leftFrame = document.getElementById("leftFrame");
const rightFrame = document.getElementById("rightFrame");

function createImageSelect() {
  const select = document.getElementById("imageSelect");
  select.innerHTML = `<option value="">▼資料を表示</option>`;

  imageList.forEach((item) => {
    const option = document.createElement("option");
    option.value = item.url;
    option.textContent = item.title;
    select.appendChild(option);
  });

  select.onchange = async () => {
    const selectedUrl = select.value;
    if (!selectedUrl) return;

    showImage(selectedUrl);

    await channel.publish("show-image", {
      url: selectedUrl
    });

    updateStatusDisplay("画像送信");
    select.value = "";
  };
}

function showImage(url) {
  currentImageUrl = url;
  document.body.classList.add("imageMode");
  document.getElementById("overlayImage").src = url;
  document.getElementById("imageOverlay").style.display = "flex";
}

async function hideImage(sendToStudents = true) {
  currentImageUrl = null;
  document.body.classList.remove("imageMode");
  document.getElementById("imageOverlay").style.display = "none";
  document.getElementById("overlayImage").src = "";

  if (sendToStudents) {
    await channel.publish("hide-image", {});
    updateStatusDisplay("画像解除");
  }
}

function updateInfoDisplay() {
  document.getElementById("numberButton").textContent = "ページ:" + currentNumber;
  document.getElementById("titleText").textContent = titleList[currentNumber - 1];

  document.getElementById("numberButton").onclick = () => {
    if (confirm("ページを強制更新しますか？")) {
      updateIframes(true);
      updateStatusDisplay("強制更新");
    }
  };
}

function updateStatusDisplay(status) {
  document.getElementById("forceReloadButton").textContent =
    "状態:" + status + " / CH:" + getChannelLabel();
}

function updateDisplays(status) {
  updateInfoDisplay();
  updateStatusDisplay(status);
}

function updateIframes(forceReload = false) {
  const leftUrl = teacherUrlListLeft[currentNumber - 1];
  const rightUrl = teacherUrlListRight[currentNumber - 1];

  if (rightUrl === null) {
    leftPane.style.width = "100%";
    rightPane.classList.add("hidden");
    divider.classList.add("hidden");

    if (leftUrl !== "mama") {
      lastLeftUrl = leftUrl;
      leftFrame.src = leftUrl;
    } else if (forceReload && lastLeftUrl) {
      leftFrame.src = lastLeftUrl;
    }

    rightFrame.src = "about:blank";
  } else {
    leftPane.style.width = leftWidthPercent + "%";
    rightPane.style.width = (100 - leftWidthPercent) + "%";

    rightPane.classList.remove("hidden");
    divider.classList.remove("hidden");

    if (leftUrl !== "mama") {
      lastLeftUrl = leftUrl;
      leftFrame.src = leftUrl;
    } else if (forceReload && lastLeftUrl) {
      leftFrame.src = lastLeftUrl;
    }

    if (rightUrl !== "mama") {
      lastRightUrl = rightUrl;
      rightFrame.src = rightUrl;
    } else if (forceReload && lastRightUrl) {
      rightFrame.src = lastRightUrl;
    }
  }
}

async function sendCurrentNumber() {
  try {
    await channel.publish("next-number", {
      number: currentNumber
    });
    updateStatusDisplay("送信済み");
  } catch (error) {
    updateStatusDisplay("送信エラー");
    console.error(error);
  }
}

document.getElementById("prevButton").onclick = () => {
  if (currentNumber > 1) {
    if (confirm("前のページに戻りますか？")) {
      currentNumber--;
      updateDisplays("送信中");
      updateIframes();
      sendCurrentNumber();
    }
  }
};

document.getElementById("nextButton").onclick = () => {
  if (currentNumber < titleList.length) {
    if (confirm("次のページに移動しますか？")) {
      currentNumber++;
      updateDisplays("送信中");
      updateIframes();
      sendCurrentNumber();
    }
  }
};

document.getElementById("forceReloadButton").onclick = () => {
  updateStatusDisplay("再送信中");
  sendCurrentNumber();
};

document.getElementById("closeImageButton").onclick = () => {
  hideImage(true);
};

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    hideImage(true);
  }
});

ably.connection.on((stateChange) => {
  updateStatusDisplay(stateChange.current);
});

channel.subscribe("request-current-number", () => {
  updateStatusDisplay("状態問い合わせ受信");

  channel.publish("sync-state", {
    number: currentNumber,
    imageUrl: currentImageUrl
  });

  updateStatusDisplay("状態送信済み");
});

divider.addEventListener("pointerdown", (event) => {
  isDragging = true;
  document.body.classList.add("dragging");
  divider.setPointerCapture(event.pointerId);
  event.preventDefault();
});

divider.addEventListener("pointerup", (event) => {
  isDragging = false;
  document.body.classList.remove("dragging");
  divider.releasePointerCapture(event.pointerId);
});

divider.addEventListener("pointermove", (event) => {
  if (!isDragging) return;

  const rect = document.getElementById("frameArea").getBoundingClientRect();
  let percent = ((event.clientX - rect.left) / rect.width) * 100;
  percent = Math.max(10, Math.min(90, percent));

  leftWidthPercent = percent;
  leftPane.style.width = leftWidthPercent + "%";
  rightPane.style.width = (100 - leftWidthPercent) + "%";

  event.preventDefault();
});

createImageSelect();
updateIframes();
updateDisplays("初期表示");
</script>

</body>
</html>
